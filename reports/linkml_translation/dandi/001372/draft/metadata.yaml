description: 'The center for Large-scale Imaging of Neural Circuits (LINC) is funded
  by an NIH BRAIN Initiative CONNECTS UM1 comprehensive center award (PIs: Haber,
  Hillman, Yendiki). Its goal is to develop novel technologies for imaging brain connections
  down to the microscopic scale, and deploy these technologies to image cortico-subcortical
  projections that are relevant to deep-brain stimulation for motor and psychiatric
  disorders.'
